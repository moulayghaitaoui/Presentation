<!DOCTYPE html>
<html dir="rtl" lang="ar">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>بوابة انشغالات - غلاف العرض التقديمي</title>
    <script src="https://picture-search.skywork.ai/aippt/static/tailwindcss.com"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;700&family=Tajawal:wght@400;700&display=swap");

        html {
            box-sizing: border-box;
        }

        *,
        *:before,
        *:after {
            box-sizing: inherit;
        }

        body {
            min-height: 100vh;
            background-color: #F0F0F0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "IBM Plex Sans Arabic", "Tajawal", sans-serif;
            margin: 0;
            padding: 20px;
        }

        .presentation-cover-root {
            width: 100%;
            max-width: 1280px;
            min-height: 720px;
            background-color: #FBFBFB;
            display: flex;
            flex-direction: row;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .right-text-container {
            width: 55%;
            display: flex;
            flex-direction: column;
            padding: 80px 60px;
            background-color: #FFF;
        }

        .left-visual-container {
            width: 45%;
            position: relative;
        }

        .header-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 80px;
        }

        .ministry-logo {
            width: 90px;
            height: 90px;
            object-fit: contain;
        }

        .ministry-identity-text {
            color: #036;
            font-size: 24px;
            font-weight: 700;
            border-right: 6px solid #28A745;
            padding-right: 15px;
            margin-bottom: 0;
        }

        .main-project-heading {
            color: #036;
            font-size: 52px;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 24px;
        }

        .secondary-project-description {
            color: #555;
            font-size: 22px;
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 60px;
            max-width: 90%;
        }

        .accent-status-block {
            background-color: #28A745;
            color: #FFF;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 4px;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 60px;
        }

        .bottom-date-label {
            margin-top: auto;
            color: #888;
            font-size: 16px;
            font-weight: 400;
        }

        .cover-image-element {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .presentation-cover-root {
                flex-direction: column-reverse;
                min-height: auto;
            }

            .right-text-container {
                width: 100%;
                padding: 40px;
            }

            .left-visual-container {
                width: 100%;
                height: 400px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .presentation-cover-root {
                border-radius: 0;
            }

            .header-container {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 40px;
            }

            .ministry-identity-text {
                font-size: 20px;
                border-right: 4px solid #28A745;
            }

            .main-project-heading {
                font-size: 36px;
                margin-bottom: 20px;
            }

            .secondary-project-description {
                font-size: 18px;
                max-width: 100%;
                margin-bottom: 40px;
            }

            .left-visual-container {
                height: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="presentation-cover-root" style="overflow: hidden;">
        <!-- القسم الأيمن: النصوص والمعلومات -->
        <div class="right-text-container">
            <div class="header-container">
                <img src="logo.png" alt="الشعار" class="ministry-logo" />
                <div class="ministry-identity-text">
                    <span
                        style="display: block; font-size: 16px; font-weight: 400; color: #555; margin-bottom: 4px;">الجمهورية
                        الجزائرية الديمقراطية الشعبية</span>
                    <span>وزارة التكوين والتعليم المهنيين</span>
                </div>
            </div>
            <h1 class="main-project-heading">
                بوابة انشغالات –<br />
                المنصة الرقمية لإدارة انشغالات
            </h1>
            <p class="secondary-project-description">
                نحو حوكمة رقمية وشفافية في قطاع التكوين والتعليم المهنيين لتعزيز كفاءة معالجة تظلمات وانشغالات
                المواطنين.
            </p>
            <div class="accent-status-block">
                مشروع التحول الرقمي 2026
            </div>

        </div>
        <!-- القسم الأيسر: الصورة البصرية -->
        <div class="left-visual-container">
            <img alt="صورة الوزيرة" class="cover-image-element" src="image.png" />
        </div>
    </div>

</body>

</html>
